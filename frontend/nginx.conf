server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy ALL API calls to runtime on Akash
    # proxy_ssl_server_name sends correct SNI during TLS handshake
    location /api/ {
        proxy_pass https://jd5gauqmh1ai5advf8s5m81nko.ingress.oregon.skyfall.cz;
        proxy_ssl_verify off;
        proxy_ssl_server_name on;
        proxy_set_header Host jd5gauqmh1ai5advf8s5m81nko.ingress.oregon.skyfall.cz;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # Cache static assets (React bundle has hashed filenames)
    location ~* \.(js|css|png|jpg|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
