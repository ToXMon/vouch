---
# Vouch Frontend — Akash SDL
# Static nginx serving vanilla HTML. No build step required.
# Aligned to match the runtime SDL format that successfully received bids.

version: "2.0"

services:
  vouch-frontend:
    image: ghcr.io/toxmon/vouch-frontend:latest
    expose:
      - port: 80
        as: 80
        to:
          - global: true

profiles:
  compute:
    vouch-frontend:
      resources:
        cpu:
          units: 0.25
        memory:
          size: 256Mi
        storage:
          size: 1Gi

  placement:
    akash:
      # No signedBy/attribute filters — accept bids from any provider.
      pricing:
        vouch-frontend:
          denom: uact
          amount: 1000

deployment:
  vouch-frontend:
    akash:
      profile: vouch-frontend
      count: 1
